name: Autonomous System CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'autonomous-system/**'
  pull_request:
    branches: [main]
    paths:
      - 'autonomous-system/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd autonomous-system
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          cd autonomous-system
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          cd autonomous-system
          ruff check .
          ruff format --check .

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f autonomous-system/docker/Dockerfile -t vtaper-autonomous:latest .

      - name: Test Docker image
        run: |
          docker run --rm vtaper-autonomous:latest python -c "print('Docker image OK')"
