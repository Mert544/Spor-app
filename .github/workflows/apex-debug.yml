name: Apex Debug Audit

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'api/**'
      - 'scripts/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'api/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  apex-debug:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache apex-debug
        uses: actions/cache@v4
        with:
          path: ~/.local/share/apex-debug
          key: apex-debug-${{ runner.os }}-${{ hashFiles('**/apex-debug/**') }}

      - name: Install apex-debug
        run: |
          git clone --depth 1 https://github.com/${{ github.repository_owner }}/apex-debug.git /tmp/apex-debug || \
          git clone --depth 1 https://github.com/apex-agents/apex-debug.git /tmp/apex-debug || \
          echo "Clone failed, skipping"
          if [ -d "/tmp/apex-debug" ]; then
            cd /tmp/apex-debug
            pip install -e . || echo "apex-debug install skipped (setuptools compat)"
          fi
        continue-on-error: true

      - name: Run apex-debug (diff only for PR)
        run: |
          if ! python -c "import apex_debug" 2>/dev/null; then
            echo "apex-debug not available, skipping"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python -m apex_debug.cli.app analyze src/ --diff --output sarif --exit-code || true
          else
            python -m apex_debug.cli.app analyze src/ --output sarif --exit-code || true
          fi
        env:
          PYTHONPATH: /tmp/apex-debug
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: report.sarif
          category: apex-debug

      - name: Comment PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Apex Debug** found issues in this PR. Check the Security tab for details.'
            })
