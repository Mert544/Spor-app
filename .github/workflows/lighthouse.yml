name: Lighthouse CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
      - name: Run Playwright setup
        run: npx playwright install --with-deps chromium
      - name: Preview server
        run: |
          npx serve dist -p 4173 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        continue-on-error: true
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Collect Lighthouse report
        if: always()
        run: |
          if [ -f lhci_report.html ]; then
            echo "Lighthouse report available"
          fi
          if [ -f lhci_reports/lhci_*_report.html ]; then
            echo "Collected $(ls lhci_reports/lhci_*_report.html | wc -l) reports"
          fi
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: |
            lhci_report.html
            lhci_reports/
          retention-days: 30