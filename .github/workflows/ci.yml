name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist/
          retention-days: 7

  apex-debug:
    name: Apex Debug Audit
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install apex-debug
        run: |
          git clone --depth 1 https://github.com/${{ github.repository_owner }}/apex-debug.git /tmp/apex-debug || \
          git clone --depth 1 https://github.com/apex-agents/apex-debug.git /tmp/apex-debug || \
          echo "Using local apex-debug"
          if [ -d "/tmp/apex-debug" ]; then
            cd /tmp/apex-debug
            pip install -e .
          fi

      - name: Run apex-debug
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python -m apex_debug.cli.app analyze src/ --diff --output sarif --exit-code || true
          else
            python -m apex_debug.cli.app analyze src/ --output sarif --exit-code || true
          fi
        env:
          PYTHONPATH: /tmp/apex-debug

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report.sarif
          category: apex-debug

  apex-orchestrator:
    name: Apex Orchestrator Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Apex Orchestrator
        run: |
          git clone --depth 1 https://github.com/${{ github.repository_owner }}/Apex-orchestrator.git /tmp/apex-orch || \
          git clone --depth 1 https://github.com/apex-agents/Apex-orchestrator.git /tmp/apex-orch || \
          echo "Using local Apex Orchestrator"
          if [ -d "/tmp/apex-orch" ]; then
            cd /tmp/apex-orch
            pip install -e ".[dev]"
          fi

      - name: Run Apex Orchestrator
        run: |
          cd /tmp/apex-orch
          export EPISTEMIC_TARGET_ROOT=${{ github.workspace }}
          export EPISTEMIC_AUTOMATION_PLAN=verify_project
          python -m app.cli scan --target=${{ github.workspace }} --plan=verify_project --mode=report
        env:
          PYTHONPATH: /tmp/apex-orch
          APEX_USE_FRACTAL: 1

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apex-orchestrator-report
          path: |
            .apex/*.md
            .apex/*.json
          retention-days: 30
